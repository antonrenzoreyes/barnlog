name: Coverage

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: backend
          fail_ci_if_error: true

  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07
        with:
          node-version: 22
          cache: true
          cache-dependency-path: frontend/pnpm-lock.yaml
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run frontend unit tests with coverage
        # Intentionally targets Node unit tests only. Browser component tests run in a separate Playwright-backed lane.
        run: vp run test:unit -- --project unit --run --coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: true
