name: Frontend CI

on:
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"
      - "backend/docs/swagger.yaml"
      - "backend/docs/swagger.json"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify generated API types
        run: bun run check:api-types

      - name: Type check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Build (with Codecov bundle analysis)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: bun run build

      - name: Unit tests
        run: bunx vitest --project unit --run
