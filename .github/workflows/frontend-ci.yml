name: Frontend CI

on:
  pull_request:
    branches: [master]
    paths:
      - "frontend/**"
      - "backend/docs/swagger.yaml"
      - "backend/docs/swagger.json"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@b5d848f5a62488f3d3d920f8aa6ac318a60c5f07 # v1
        with:
          node-version: "22"
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Verify generated API types
        run: vp run check:api-types

      - name: Vite+ check
        run: vp check

      - name: Svelte type check
        run: vp run check

      - name: Svelte Lint
        run: vp run lint:svelte

      - name: Build (with Codecov bundle analysis)
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: vp run build

      - name: Unit tests
        run: vp test --project unit --run
